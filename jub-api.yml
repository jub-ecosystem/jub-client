services:
 jub-db:
  image: mongo:8-noble
  ports:
    - ${JUB_MONGODB_HOST_PORT:-27027}:27017
  volumes:
    - jub-db:/data/db
    - ./db/mongod.conf:/etc/mongo/mongod.conf:ro
  networks:
    - jub
  restart: unless-stopped
  command: ["mongod", "--config","/etc/mongo/mongod.conf"]
  
 jub:
  image: ${JUB_IMAGE_NAME:-jub:api-0.0.2}
  env_file:
    - .env.dev
  ports:
    - ${JUB_PORT:-5000}:${JUB_PORT:-5000}
  networks:
    - jub
  command: uvicorn jubapi.server:app --host ${JUB_HOST:-0.0.0.0} --port ${JUB_PORT:-5000} --reload

 xolo-db:
  image: mongo:8-noble
  ports:
    - ${XOLO_MONGODB_PORT:-27018}:27017
  volumes:
    - xolo-db:/data/db
    - ./db/mongod.conf:/etc/mongo/mongod.conf:ro

  networks:
    - jub
  restart: unless-stopped
  command: ["mongod", "--config","/etc/mongo/mongod.conf"]
# =============================
# XOLO Cache Service
# =============================
 xolo-cache:
  image: redis:7.0.11-alpine
  ports:
    - ${XOLO_CACHE_REDIS_PORT:-6379}:6379
  volumes:
    - xolo-cache-data:/data
  networks:
    - jub
  restart: unless-stopped

# =============================
# XOLO API Service
# =============================
 xolo:
  image: nachocode/xolo:api-0.0.11a2
  env_file:
    - .env.dev
  ports:
    - ${XOLO_PORT:-10000}:${XOLO_PORT:-10000}
  volumes:
    - xolo-data:/xolo
  networks:
    - jub
  restart: unless-stopped
  depends_on:
    - xolo-db
  command: uvicorn xoloapi.server:app --host ${XOLO_HOST:-0.0.0.0} --port ${XOLO_PORT:-10000} --log-level debug

networks:
  jub:
    external: true
volumes:
  jub-db:
  xolo-db:
  xolo-data:
  xolo-cache-data:
